name: Frontend — CI/CD/Sec Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  # ─── SECRET SCANNING ──────────────────────────────────────────────────────
  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Escanear credenciales expuestas
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── IaC SCANNING (Dockerfile) ────────────────────────────────────────────
  iac-scanning:
    name: IaC Scanning (Hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint — frontend/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          no-fail: true

  # ─── SAST + SCA ────────────────────────────────────────────────────────────
  sast-sca:
    name: SAST (ESLint) + SCA (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: SAST — ESLint (reglas de seguridad)
        working-directory: frontend
        run: npx eslint src/ --ext .js,.jsx || true

      - name: SCA — npm audit (CVEs en dependencias)
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # ─── IMAGE SCANNING (Trivy) ─────────────────────────────────────────────────
  build-and-scan:
    name: Build + Trivy
    needs: [sast-sca, iac-scanning, secret-scanning]
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build imagen Docker
        run: docker build -t notevate/frontend:${{ github.sha }} ./frontend

      - name: Trivy — escaneo de vulnerabilidades en la imagen
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "notevate/frontend:${{ github.sha }}"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"

      - name: Publicar resultados Trivy en GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-frontend.sarif"
          category: "trivy-frontend"
